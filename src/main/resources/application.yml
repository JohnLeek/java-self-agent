spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/agent_db
    username: agent
    password: ${DB_PASSWORD:agent123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  ai:
    openai:
      api-key: ${LLM_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

agent:
  mode: multi    # single / multi — 单Agent或多Agent（Orchestrator+3个Specialist）
